<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OWASP AISVS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <h1>OWASP AISVS</h1>
      <span class="subtitle">interactive controls explorer</span>
    </div>
    <div class="header-controls">
      <input type="search" id="search" placeholder="Search controls…" aria-label="Search controls" />
      <div class="filter-chips" role="group" aria-label="Filter by level">
        <button class="chip active" data-filter="l1">L1</button>
        <button class="chip active" data-filter="l2">L2</button>
        <button class="chip active" data-filter="l3">L3</button>
      </div>
    </div>
    <a class="gh-link" href="https://github.com/OWASP/AISVS" target="_blank" rel="noopener" aria-label="AISVS on GitHub">
      <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
          1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
          1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
          1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </header>

  <main>
    <div id="graph-panel" aria-label="Requirements graph">
      <svg id="graph"></svg>
      <div class="hints" aria-hidden="true">Scroll to zoom · Drag to pan · Click node to explore</div>
      <div id="loading">
        <div class="spinner"></div>
        <span>Loading requirements…</span>
      </div>
      <div id="legend">
        <span class="legend-item"><span class="dot chapter"></span>Chapter</span>
        <span class="legend-item"><span class="dot section"></span>Section</span>
        <span class="legend-item"><span class="dot l1"></span>L1</span>
        <span class="legend-item"><span class="dot l2"></span>L2</span>
        <span class="legend-item"><span class="dot l3"></span>L3</span>
      </div>
    </div>

    <aside id="detail-panel" aria-label="Control detail" hidden>
      <div class="detail-header">
        <button id="back-detail" aria-label="Go back" hidden>← Back</button>
        <button id="close-detail" aria-label="Close detail panel">✕</button>
      </div>
      <span id="detail-badge"></span>
      <h2 id="detail-title"></h2>
      <p id="detail-desc"></p>
      <div id="detail-meta"></div>
      <ul id="detail-children"></ul>
    </aside>
  </main>

  <div id="tooltip" role="tooltip" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
